name: 构建 War3Trainer EXE

on:
  push:
    branches: [ main ]  # 推送到 main 时自动构建
  workflow_dispatch:    # 允许手动点一下触发构建

jobs:
  build:
    runs-on: windows-latest  # C# 必须用 Windows 环境
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 .NET 环境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'  # 兼容绝大多数老 C# 项目

      - name: 还原依赖 & 编译 Release 版本
        run: |
          dotnet restore
          dotnet build War3Trainer.sln -c Release -o output

      - name: 上传编译好的 EXE 文件
        uses: actions/upload-artifact@v4
        with:
          name: War3Trainer-EXE
          path: output/
