name: 构建 War3Trainer 单文件 EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: 启用 MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 编译项目
        run: |
          msbuild War3Trainer.sln /p:Configuration=Release /p:TargetFrameworkVersion=v4.8 /p:OutputPath=../publish

      # 🔥 核心：把所有文件打包成 1 个独立 EXE
      - name: 安装 Costura.Fody 打包工具
        run: |
          cd War3Trainer
          dotnet add package Costura.Fody
          msbuild /p:Configuration=Release /p:TargetFrameworkVersion=v4.8 /p:OutputPath=../single-exe

      - name: 上传单文件 EXE
        uses: actions/upload-artifact@v4
        with:
          name: War3Trainer-Single-EXE
          path: single-exe/*.exe
