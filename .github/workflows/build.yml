name: 构建 War3Trainer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022  # 这个环境自带 .NET Framework 4.6.1
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 启用 MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 编译 Release 版本
        run: |
          msbuild War3Trainer.sln /p:Configuration=Release

      - name: 上传 EXE 文件
        uses: actions/upload-artifact@v4
        with:
          name: War3Trainer-EXE
          path: War3Trainer/bin/Release/
